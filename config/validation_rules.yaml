rules:
  # =========================================================================
  # Data Freshness — is the pipeline producing data?
  # =========================================================================

  - name: "props_freshness"
    type: "freshness"
    table: "intelligence.nba_props_xl"
    column: "fetch_timestamp"
    severity: "critical"
    params:
      max_age_hours: 4
    description: "Props must have inserts within 4hrs on game days"

  - name: "line_snapshots_freshness"
    type: "freshness"
    table: "intelligence.nba_line_snapshots"
    column: "snapshot_at"
    severity: "critical"
    params:
      max_age_hours: 4
    description: "Line snapshots must be captured within 4hrs"

  # =========================================================================
  # Volume Checks — are we getting enough data?
  # =========================================================================

  - name: "line_snapshot_volume"
    type: "custom_sql"
    severity: "critical"
    description: "15K+ snapshots expected per game day"
    params:
      sql: >
        SELECT CASE WHEN COUNT(*) < 15000 THEN 1 ELSE 0 END AS violation_count
        FROM intelligence.nba_line_snapshots
        WHERE game_date = CURRENT_DATE

  - name: "book_coverage_minimum"
    type: "custom_sql"
    severity: "warning"
    description: "At least 5 sportsbooks should have data in last 6 hours"
    params:
      sql: >
        SELECT CASE WHEN COUNT(DISTINCT book_name) < 5 THEN 1 ELSE 0 END AS violation_count
        FROM intelligence.nba_line_snapshots
        WHERE snapshot_at >= NOW() - INTERVAL '6 hours'

  # =========================================================================
  # Prediction Quality — are model outputs sane?
  # =========================================================================

  - name: "probability_bounds"
    type: "custom_sql"
    severity: "critical"
    description: "Calibrated probabilities must be 0.35-0.95 (extremes indicate bugs)"
    params:
      sql: >
        SELECT COUNT(*) AS violation_count
        FROM axiom.nba_prediction_history
        WHERE run_date = CURRENT_DATE
          AND (p_over < 0.35 OR p_over > 0.95)

  - name: "prediction_model_version_not_null"
    type: "null_check"
    table: "axiom.nba_prediction_history"
    column: "model_version"
    severity: "critical"
    description: "Every prediction must have a model version"

  # =========================================================================
  # Pipeline Health — is the orchestration working?
  # =========================================================================

  - name: "feature_count_regression"
    type: "custom_sql"
    severity: "critical"
    description: "Pipeline must produce at least 102 features (XL baseline)"
    params:
      sql: >
        SELECT COUNT(*) AS violation_count
        FROM axiom.pipeline_runs
        WHERE run_date = CURRENT_DATE
          AND (summary->>'feature_count')::int < 102

  - name: "conviction_distribution_check"
    type: "custom_sql"
    severity: "warning"
    description: "LOCKED > 20% signals filter degradation"
    params:
      sql: >
        SELECT CASE
          WHEN COUNT(*) > 0 AND
               100.0 * SUM(CASE WHEN conviction_label = 'LOCKED' THEN 1 ELSE 0 END) / COUNT(*) > 20
          THEN 1 ELSE 0 END AS violation_count
        FROM axiom.axiom_conviction
        WHERE run_date = CURRENT_DATE

  # =========================================================================
  # Model Registry — is the deployed model healthy?
  # =========================================================================

  - name: "model_rollback_detection"
    type: "custom_sql"
    severity: "critical"
    description: "Detect unexpected rollbacks in last 24hrs"
    params:
      sql: >
        SELECT COUNT(*) AS violation_count
        FROM axiom.model_registry
        WHERE rolled_back_at > NOW() - INTERVAL '24 hours'

  - name: "seven_day_win_rate"
    type: "custom_sql"
    severity: "high"
    description: "7-day rolling WR below 60% signals model degradation"
    params:
      sql: >
        SELECT CASE
          WHEN COUNT(*) > 0 AND
               AVG(CASE WHEN is_hit THEN 1.0 ELSE 0.0 END) < 0.60
          THEN 1 ELSE 0 END AS violation_count
        FROM axiom.nba_prediction_history
        WHERE is_hit IS NOT NULL
          AND run_date > CURRENT_DATE - 7
