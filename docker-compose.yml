services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME:-sentinel}"
      POSTGRES_USER: "${DB_USER:-sentinel}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-sentinel_pass}"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: pg_isready -U ${DB_USER:-sentinel} -d ${DB_NAME:-sentinel}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  sentinel:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SENTINEL_PORT:-8000}:8000"
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-sentinel}"
      DB_USER: "${DB_USER:-sentinel}"
      DB_PASSWORD: "${DB_PASSWORD:-sentinel_pass}"
      SENTINEL_LOG_LEVEL: "${SENTINEL_LOG_LEVEL:-INFO}"
      SENTINEL_LOG_FORMAT: "${SENTINEL_LOG_FORMAT:-json}"
    volumes:
      - ./config:/app/config
      - ./sql:/app/sql
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
